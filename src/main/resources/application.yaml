spring:
  session:
    store-type: redis
    timeout: 2592000
  application:
    name: ai-code-backend
  datasource:
    url: jdbc:mysql://localhost:3306/kaoyu_ai_code_generate
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  profiles:
    active: local
  data:
    redis:
      host: localhost
      port: 6379
      password:
      ttl: 3600  # 秒

mybatis-flex:
  global-config:
    logic-delete-column: isDelete
    normal-value-of-logic-delete: 0
    deleted-value-of-logic-delete: 1


server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000

# springdoc-openapi
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  api-docs:
    path: /v3/api-docs
  group-configs:
    - group: 'default'
      paths-to-match: '/**'
      packages-to-scan: com.kaoyu.aicodebackend.controller
# knife4j
knife4j:
  enable: true
  setting:
    language: zh_cn



